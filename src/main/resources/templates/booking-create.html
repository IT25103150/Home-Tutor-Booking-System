<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Booking - HomeTutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/booking-form.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book"></i> HomeTutor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/tutors">Find Tutors</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/bookings">My Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reviews">My Reviews</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="premium-header">
        <div class="container text-center">
            <h1>Create New Booking</h1>
            <p>Schedule a learning session with your chosen tutor</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card animate-fade-in">
                    <form id="bookingForm">
                        <!-- Tutor Selection -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-user-tie text-primary"></i> Select Tutor *
                            </label>
                            <select id="tutorId" class="form-select" required onchange="updateTutorDetails()">
                                <option value="">-- Choose a tutor --</option>
                            </select>
                            <small class="text-muted d-block mt-2">
                                <i class="fas fa-dollar-sign text-success"></i> <strong>Hourly Rate:</strong> $<span id="tutorRate" class="fw-bold">0.00</span>
                            </small>
                        </div>

                        <!-- Subject -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-book text-primary"></i> Subject *
                            </label>
                            <input type="text" id="subject" class="form-control" placeholder="Enter subject (e.g., Mathematics)" required>
                        </div>

                        <!-- Date & Time -->
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">
                                    <i class="fas fa-calendar text-primary"></i> Date *
                                </label>
                                <input type="date" id="bookingDate" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-clock text-primary"></i> Time *
                                </label>
                                <input type="time" id="bookingTime" class="form-control" required>
                            </div>
                        </div>

                        <!-- Duration -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-hourglass-half text-primary"></i> Duration (minutes) *
                            </label>
                            <select id="duration" class="form-select" required onchange="calculateCost()">
                                <option value="">-- Select duration --</option>
                                <option value="30">30 minutes</option>
                                <option value="60">60 minutes (1 hour)</option>
                                <option value="90">90 minutes</option>
                                <option value="120">120 minutes (2 hours)</option>
                            </select>
                        </div>

                        <!-- Cost Summary -->
                        <div class="cost-summary mb-4">
                            <h5 class="fw-bold mb-3"><i class="fas fa-file-invoice-dollar text-primary"></i> Pricing Details</h5>
                            <div class="cost-row">
                                <span>Hourly Rate:</span>
                                <span>$<span id="summaryRate">0.00</span></span>
                            </div>
                            <div class="cost-row">
                                <span>Duration:</span>
                                <span><span id="summaryDuration">0</span> minutes</span>
                            </div>
                            <div class="cost-row total">
                                <span>Total Cost:</span>
                                <span>$<span id="totalCost">0.00</span></span>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="button" class="btn-lg btn-secondary" onclick="window.history.back()">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </button>
                            <button type="submit" class="btn-lg btn-primary">
                                <i class="fas fa-check"></i> Confirm Booking
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <!-- Footer -->
    <footer class="footer-custom">
        <div class="container text-center">
            <p>&copy; 2024 HomeTutor. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/booking-form.js"></script>
</body>
</html>
