<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Tutors - HomeTutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/tutor-list.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book"></i> HomeTutor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/tutors">Find Tutors</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/bookings">My Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reviews">My Reviews</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="premium-header">
        <div class="container text-center">
            <h1>Find Your Perfect Tutor</h1>
            <p>Browse through our list of qualified tutors and book a session</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container py-4">
        <!-- Search & Filter -->
        <div class="search-container animate-fade-in mb-5">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search by name...">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted">
                            <i class="fas fa-filter"></i>
                        </span>
                        <select id="subjectFilter" class="form-select border-start-0">
                            <option value="">Filter by subject...</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tutors Grid -->
        <div class="row animate-fade-in" id="tutorsContainer">
            <!-- Tutors will be loaded here by JavaScript -->
        </div>

        <!-- No results message -->
        <div id="noResults" class="alert alert-no-results text-center d-none" role="alert">
            <i class="fas fa-search fa-2x mb-3 text-primary d-block"></i>
            <h4>No Tutors Found</h4>
            <p class="mb-0">Try adjusting your filters or search keywords.</p>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal fade" id="bookingModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Book a Session with <span id="tutorName"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookingForm">
                        <input type="hidden" id="tutorId">
                        <div class="mb-4">
                            <label class="form-premium-label"><i class="fas fa-book"></i> Subject *</label>
                            <select id="subject" class="form-select form-premium-control" required>
                                <option value="">Select subject...</option>
                            </select>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-premium-label"><i class="fas fa-calendar"></i> Date *</label>
                                <input type="date" id="bookingDate" class="form-control form-premium-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-premium-label"><i class="fas fa-clock"></i> Time *</label>
                                <input type="time" id="bookingTime" class="form-control form-premium-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-premium-label"><i class="fas fa-hourglass-half"></i> Duration *</label>
                            <select id="duration" class="form-select form-premium-control" required>
                                <option value="30">30 minutes</option>
                                <option value="60" selected>60 minutes (1 hour)</option>
                                <option value="90">90 minutes</option>
                                <option value="120">120 minutes (2 hours)</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label class="form-premium-label"><i class="fas fa-calculator"></i> Estimated Cost</label>
                            <div class="alert-info-premium">
                                <span>Total Price:</span>
                                <strong>$<span id="estimatedCost">0.00</span></strong>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmBooking">Book Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-custom">
        <div class="container text-center">
            <p>&copy; 2026 HomeTutor. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/tutor-list.js"></script>
</body>
</html>
