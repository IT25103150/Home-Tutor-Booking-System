<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Booking - HomeTutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/booking-form.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book"></i> HomeTutor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/tutors">Find Tutors</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/bookings">My Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reviews">My Reviews</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="premium-header">
        <div class="container text-center">
            <h1>Edit Booking Details</h1>
            <p>Update or modify your scheduled session parameters</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card animate-fade-in">
                    <form id="editBookingForm">
                        <input type="hidden" id="bookingId">

                        <!-- Tutor Info (Read-only) -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-user-tie text-primary"></i> Tutor
                            </label>
                            <input type="text" id="tutorInfo" class="form-control" readonly style="background-color: #f1f5f9; cursor: not-allowed; font-weight: 600;">
                        </div>

                        <!-- Date & Time -->
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">
                                    <i class="fas fa-calendar text-primary"></i> Date *
                                </label>
                                <input type="date" id="editDate" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-clock text-primary"></i> Time *
                                </label>
                                <input type="time" id="editTime" class="form-control" required>
                            </div>
                        </div>

                        <!-- Status Update -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-tasks text-primary"></i> Status *
                            </label>
                            <select id="editStatus" class="form-select" required>
                                <option value="PENDING">Pending</option>
                                <option value="CONFIRMED">Confirmed</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="CANCELLED">Cancelled</option>
                            </select>
                        </div>

                        <!-- Booking Summary -->
                        <div class="cost-summary mb-4">
                            <h5 class="fw-bold mb-3"><i class="fas fa-info-circle text-primary"></i> Session Summary</h5>
                            <div class="cost-row">
                                <span>Subject:</span>
                                <span class="fw-bold text-dark" id="editSubject"></span>
                            </div>
                            <div class="cost-row">
                                <span>Duration:</span>
                                <span class="fw-bold text-dark"><span id="editDuration"></span> minutes</span>
                            </div>
                            <div class="cost-row total">
                                <span>Total Cost:</span>
                                <span>$<span id="editTotalCost">0.00</span></span>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="button" class="btn-lg btn-secondary" onclick="window.history.back()">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </button>
                            <button type="submit" class="btn-lg btn-primary">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <!-- Footer -->
    <footer class="footer-custom">
        <div class="container text-center">
            <p>&copy; 2026 HomeTutor. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/booking-edit.js"></script>
</body>
</html>
