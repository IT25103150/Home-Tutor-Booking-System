<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | HomeTutor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <header>
            <a href="tutors.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 2.5 0 0 1 0-5H20"/></svg>
                HomeTutor
            </a>
        </header>

        <a href="booking-create.html" class="text-muted mb-4" style="display: inline-block; text-decoration: none;">&larr; Back to Booking</a>

        <div class="grid grid-2" style="grid-template-columns: 3fr 2fr;">
            <!-- Payment Form -->
            <div class="card">
                <h2 class="mb-4">Payment Details</h2>
                <form action="booking-confirmation.html">
                    <div class="form-group">
                        <label>Name on Card</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="XXXX XXXX XXXX XXXX" required>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY" required>
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <input type="text" placeholder="123" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-4" style="width: 100%;">Confirm Payment</button>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="card" style="background: #f8fafc; border: none;">
                <h3 class="mb-4">Order Summary</h3>
                <div class="flex items-center gap-4 mb-4 pb-4" style="border-bottom: 1px solid var(--border);">
                    <img src="https://ui-avatars.com/api/?name=Sarah+Jenkins&background=random" alt="Sarah" style="width: 50px; height: 50px; border-radius: 50%;">
                    <div>
                        <h4 style="margin: 0;">Sarah Jenkins</h4>
                        <p class="text-muted" style="font-size: 0.875rem;">Calculus</p>
                    </div>
                </div>
                
                <div class="flex justify-between mb-2">
                    <span class="text-muted">Date</span>
                    <strong>Oct 24, 2024</strong>
                </div>
                <div class="flex justify-between mb-4 pb-4" style="border-bottom: 1px solid var(--border);">
                    <span class="text-muted">Time</span>
                    <strong>10:00 AM - 11:00 AM</strong>
                </div>

                <div class="flex justify-between items-center">
                    <span>Total</span>
                    <h2 style="color: var(--primary); margin: 0;">$45.00</h2>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
