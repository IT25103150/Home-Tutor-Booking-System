<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Session | HomeTutor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <header>
            <a href="tutors.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 2.5 0 0 1 0-5H20"/></svg>
                HomeTutor
            </a>
            <nav>
                <a href="tutors.html">Find Tutors</a>
                <a href="my-bookings.html">My Bookings</a>
            </nav>
        </header>

        <a href="tutor-profile.html" class="text-muted mb-4" style="display: inline-block; text-decoration: none;">&larr; Back to Profile</a>

        <div class="card">
            <h2 class="mb-4">Book Session with Sarah Jenkins</h2>
            
            <form action="checkout.html">
                <div class="grid grid-2 mb-4">
                    <div class="form-group">
                        <label>Select Date</label>
                        <input type="date" required>
                    </div>
                    <div class="form-group">
                        <label>Select Time</label>
                        <select required>
                            <option value="">Choose a time slot</option>
                            <option value="09:00">09:00 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="14:00">02:00 PM</option>
                            <option value="16:00">04:00 PM</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <select required>
                        <option value="">Choose subject</option>
                        <option value="math">Calculus</option>
                        <option value="physics">Physics 101</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message for Tutor (Optional)</label>
                    <textarea rows="4" placeholder="Let the tutor know what you want to focus on..."></textarea>
                </div>

                <div class="flex justify-between items-center mt-4">
                    <div>
                        <p class="text-muted" style="margin: 0;">Total Price (1 Hour)</p>
                        <h3 style="margin: 0; color: var(--primary);">$45.00</h3>
                    </div>
                    <button type="submit" class="btn btn-primary">Proceed to Checkout</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
