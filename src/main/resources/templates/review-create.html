<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Review - HomeTutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/review-form.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book"></i> HomeTutor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/tutors">Find Tutors</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/bookings">My Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/reviews">My Reviews</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="premium-header">
        <div class="container text-center">
            <h1>Write a Tutor Review</h1>
            <p>Help other students by sharing your learning experience</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card animate-fade-in">
                    <!-- Tutor Info Header Box -->
                    <div class="tutor-header">
                        <div class="tutor-avatar">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div class="tutor-details">
                            <h3 id="tutorName">Loading Tutor Name...</h3>
                            <p id="tutorSubject"><i class="fas fa-book"></i> Loading Subject...</p>
                        </div>
                    </div>

                    <form id="reviewForm">
                        <input type="hidden" id="bookingId">
                        <input type="hidden" id="tutorId">

                        <!-- Rating selection -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-star text-warning"></i> Rate Your Experience (1-5 stars) *
                            </label>
                            <div class="star-rating" id="starRating">
                                <!-- Stars will be generated by JavaScript -->
                            </div>
                            <input type="hidden" id="rating" value="0">
                        </div>

                        <!-- Feedback Comment -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-comment text-primary"></i> Your Review Feedback *
                            </label>
                            <textarea 
                                id="comment" 
                                class="form-control" 
                                rows="6" 
                                placeholder="Tell us how the lesson went... (minimum 10 characters)"
                                required
                                minlength="10"
                                maxlength="500"></textarea>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <small class="text-muted">Minimum 10 characters.</small>
                                <small class="text-muted fw-bold">
                                    <span id="charCount">0</span>/500 characters
                                </small>
                            </div>
                        </div>

                        <!-- Review Checklist Aspects -->
                        <div class="mb-5">
                            <label class="form-label">
                                <i class="fas fa-check-circle text-success"></i> What qualities did the tutor show? (Optional)
                            </label>
                            <div class="row mt-2 g-2">
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="knowledgeable">
                                        <label class="form-check-label" for="knowledgeable">
                                            Very knowledgeable
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="patient">
                                        <label class="form-check-label" for="patient">
                                            Patient and supportive
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="punctual">
                                        <label class="form-check-label" for="punctual">
                                            Professional & punctual
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="effective">
                                        <label class="form-check-label" for="effective">
                                            Highly effective methodology
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="button" class="btn-lg btn-secondary" onclick="window.history.back()">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </button>
                            <button type="submit" class="btn-lg btn-primary">
                                <i class="fas fa-paper-plane"></i> Submit Review
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <!-- Footer -->
    <footer class="footer-custom">
        <div class="container text-center">
            <p>&copy; 2024 HomeTutor. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/review-form.js"></script>
</body>
</html>
